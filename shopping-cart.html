<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise Nursery - Shopping Cart</title>
    <link rel="stylesheet" href="paradise.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="landing.html" class="nav-brand">
            <img src="https://img.icons8.com/fluency/48/potted-plant.png" alt="Paradise Nursery Logo" class="logo">
            <span class="brand-name">Paradise Nursery</span>
        </a>
        <ul class="nav-links">
            <li><a href="landing.html">Home</a></li>
            <li><a href="products.html">Plants</a></li>
            <li>
                <a href="shopping-cart.html" class="nav-cart active">
                    &#128722; Cart
                    <span id="cartBadge" class="cart-badge hidden">0</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Cart Section -->
    <main class="cart-page">
        <h1>Your Shopping Cart</h1>
        <p class="cart-subtitle">Review your selected plants before checkout</p>

        <!-- Empty State -->
        <div id="cartEmpty" class="cart-empty" style="display: none;">
            <div class="cart-empty-icon">&#128722;</div>
            <h2>Your cart is empty</h2>
            <p>Looks like you haven't added any plants yet.</p>
            <a href="products.html" class="btn-get-started" style="font-size: 0.95rem; padding: 12px 36px;">Browse Plants</a>
        </div>

        <!-- Cart Content -->
        <div id="cartContent" style="display: none;">
            <div id="cartItems" class="cart-items">
                <!-- Rendered by JavaScript -->
            </div>

            <!-- Cart Summary -->
            <div id="cartSummary" class="cart-summary">
                <!-- Rendered by JavaScript -->
            </div>

            <!-- Cart Actions -->
            <div class="cart-actions">
                <a href="products.html" class="btn-continue">Continue Shopping</a>
                <button class="btn-checkout" onclick="handleCheckout()">Checkout</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Paradise Nursery. All rights reserved.</p>
    </footer>

    <script src="paradise.js"></script>
</body>
</html>
