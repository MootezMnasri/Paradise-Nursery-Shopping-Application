<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TravelScape</title>
    <link rel="stylesheet" href="travel_recommendation.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
                <img src="https://img.icons8.com/fluency/48/globe.png" alt="Logo" class="logo">
                <span class="brand-name">TravelScape</span>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html" class="active">Contact Us</a></li>
        </ul>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search destinations or keywords..." aria-label="Search destinations">
            <button id="searchBtn" class="btn-search">Search</button>
            <button id="clearBtn" class="btn-clear">Clear</button>
        </div>
    </nav>

    <!-- Contact Us Section -->
    <section class="contact-section" style="padding-top:100px;min-height:80vh;">
        <div class="contact-content">
            <h2>Contact Us</h2>
            <form id="contactForm" onsubmit="handleContactSubmit(event)">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Your email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Tell us about your dream trip..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Send Message</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 TravelScape. All rights reserved.</p>
    </footer>

    <script src="travel_recommendation.js"></script>
</body>
</html>
